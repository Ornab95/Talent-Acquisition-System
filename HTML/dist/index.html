<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Talent Acquisition System</title>
    <link rel="icon" type="image/x-icon" href="seu.png">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
        integrity="sha512-Fo3rlrZj/k7ujTTXNE6h4aqmFHP7xlaNj9mCk8i4x6L1vUo4tMy7x8iVf4T3+l0nK9tNfqO7H4HJo7GFN/d1Tg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <meta name="description"
        content="Join SEU's Talent Acquisition System to unlock your potential and shape the future.">
    <meta name="keywords" content="SEU, Talent Acquisition, Recruitment, Careers, Southeast University">
    <meta name="author" content="SEU">
    <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans bg-gray-900 text-gray-300 m-0 p-0 flex flex-col min-h-screen">

    <!-- Main Content -->
    <div class="flex-grow flex items-center justify-center p-8 mt-1">
        <div class="flex w-full max-w-4xl bg-white rounded-3xl shadow-lg overflow-hidden">
            <!-- Left Side with Quote -->
            <div class="hidden md:flex md:w-1/2 bg-white items-center justify-center p-8">
                <div class="text-center text-gray-900">
                    <h2 class="text-4xl font-bold mb-4">Unlock Your Potential <br> at <br> Southeast University</h2>
                    <p class="text-xl">Join Us to Shape the Future!</p>
                </div>
            </div>

            <!-- Right Side with Form -->
            <div class="w-full md:w-1/2 bg-gray-800 p-8 flex items-center justify-center">
                <div class="w-full max-w-lg">
                    <h2 class="text-3xl font-bold text-white mb-6 text-center">Register with e-Recruitment</h2>
                    <form id="register-form">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                            <div>
                                <label for="first-name" class="block mb-2">First Name<span
                                        class="text-red-500">*</span></label>
                                <input type="text" id="first-name" name="first-name" placeholder="Enter your first name"
                                    required
                                    class="w-full p-3 border border-gray-600 rounded-xl bg-gray-700 text-gray-300 focus:outline-none focus:border-blue-500"
                                    aria-label="First Name">
                            </div>
                            <div>
                                <label for="middle-name" class="block mb-2">Middle Name</label>
                                <input type="text" id="middle-name" name="middle-name"
                                    placeholder="Enter your middle name"
                                    class="w-full p-3 border border-gray-600 rounded-xl bg-gray-700 text-gray-300 focus:outline-none focus:border-blue-500"
                                    aria-label="Middle Name">
                            </div>
                            <div>
                                <label for="last-name" class="block mb-2">Last Name<span
                                        class="text-red-500">*</span></label>
                                <input type="text" id="last-name" name="last-name" placeholder="Enter your last name"
                                    required
                                    class="w-full p-3 border border-gray-600 rounded-xl bg-gray-700 text-gray-300 focus:outline-none focus:border-blue-500"
                                    aria-label="Last Name">
                            </div>
                            <div>
                                <label for="date-of-birth" class="block mb-2">Date of Birth<span
                                        class="text-red-500">*</span></label>
                                <input type="date" id="date-of-birth" name="date-of-birth" required
                                    class="w-full p-3 border border-gray-600 rounded-xl bg-gray-700 text-gray-300 focus:outline-none focus:border-blue-500"
                                    aria-label="Date of Birth">
                            </div>

                            <div class="md:col-span-2">
                                <label for="email" class="block mb-2">E-mail<span class="text-red-500">*</span></label>
                                <input type="email" id="email" name="email" placeholder="Enter your email" required
                                    class="w-full p-3 border border-gray-600 rounded-xl bg-gray-700 text-gray-300 focus:outline-none focus:border-blue-500"
                                    aria-label="Email">
                            </div>
                            <div>
                                <label for="password" class="block mb-2">Password<span
                                        class="text-red-500">*</span></label>
                                <input type="password" id="password" name="password" placeholder="Enter your password"
                                    required
                                    class="w-full p-3 border border-gray-600 rounded-xl bg-gray-700 text-gray-300 focus:outline-none focus:border-blue-500"
                                    aria-label="Password">
                            </div>
                            <div>
                                <label for="retype-password" class="block mb-2">Retype Password<span
                                        class="text-red-500">*</span></label>
                                <input type="password" id="retype-password" name="retype-password"
                                    placeholder="Retype your password" required
                                    class="w-full p-3 border border-gray-600 rounded-xl bg-gray-700 text-gray-300 focus:outline-none focus:border-blue-500"
                                    aria-label="Retype Password">
                            </div>
                            <div class="md:col-span-2">
                                <label for="mobile" class="block mb-2">Mobile No.<span
                                        class="text-red-500">*</span></label>
                                <input type="tel" id="mobile" name="mobile" placeholder="Enter your mobile number"
                                    pattern="[0-9]{11}" required
                                    class="w-full p-3 border border-gray-600 rounded-xl bg-gray-700 text-gray-300 focus:outline-none focus:border-blue-500"
                                    aria-label="Mobile Number" title="Enter valid 11-digit mobile number">
                            </div>
                        </div>
                        <div class="flex items-center justify-center">
                            <button type="submit"
                                class="w-full p-3 bg-blue-400 hover:bg-white text-gray-900 font-semibold rounded-full transition duration-300">Sign
                                Up</button>
                        </div>
                    </form>
                    <p class="mt-6 text-center">
                        Already have an account? <a href="Sign-in.html"
                            class="text-blue-400 hover:text-gray-200 transition duration-300">Sign In</a>
                    </p>
                    <div class="flex items-center justify-center mt-4">
                        <a href="https://ums.seu.edu.bd/important-contact"
                            class="w-full p-3 bg-gray-700 hover:bg-gray-500 shadow-inner text-white font-semibold rounded-full transition duration-300 text-center text-lg "
                            aria-label="Important Contact">
                            Important Contact
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
<script>
    document.querySelector('#register-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const user = Object.fromEntries(formData.entries());

        try {
            const response = await fetch('http://localhost:8080/api/signup', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(user),
            });

            if (response.ok) {
                alert('Registration successful!');
                window.location.href = 'Sign-in.html';
            } else {
                const errorData = await response.json();
                alert(`Registration failed: ${errorData.message || response.statusText}`);
            }
        } catch (error) {
            console.error('Error:', error);
            alert('An error occurred. Please try again.');
        }
    });
</script>

</html>
